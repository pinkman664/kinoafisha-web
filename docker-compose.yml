services:
  # База данных Oracle XE (образ с Docker Hub)
  database:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: kinoafisha-db
    shm_size: 1g
    environment:
      ORACLE_PASSWORD: cinemaAdm1
      APP_USER: cinema_admin
      APP_USER_PASSWORD: cinemaAdm1
    # 1522 снаружи — чтобы не конфликтовать с Oracle на Windows (порт 1521)
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - kinoafisha-net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  # Node.js API
  backend:
    build: ./server
    container_name: kinoafisha-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: database
      DB_PORT: 1521
      DB_USER: cinema_admin
      DB_PASSWORD: cinemaAdm1
      DB_SERVICE_NAME: XEPDB1
      JWT_SECRET: your_super_secret_jwt_key_change_this
      FRONTEND_URL: https://localhost
      
      YOOKASSA_SHOP_ID: 1355490
      YOOKASSA_SECRET_KEY: test_EJxt4tgx0VuuuOMlGoPX8n_a2aIK-whbruazfO6DB20
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - kinoafisha-net

  # React + Nginx
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: kinoafisha-frontend
    ports:
      - "80:80"
      - "443:443" 
    volumes:
      # Пробрасываем сертификаты и конфиг напрямую в контейнер
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - kinoafisha-net

networks:
  kinoafisha-net:
    driver: bridge

volumes:
  oracle_data:
  uploads_data: