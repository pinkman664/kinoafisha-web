# Блок для автоматического редиректа с HTTP на HTTPS
server {
    listen 80;
    server_name localhost _;
    return 301 https://$host$request_uri;
}

# Основной блок HTTPS
server {
    listen 443 ssl;
    server_name localhost _;

    # Пути к сертификатам mkcert внутри контейнера
    ssl_certificate /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # Современные настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Максимальный размер загружаемых файлов (для постеров и трейлеров)
    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # Внутренний DNS-резолвер Docker. 
    # Нужен, чтобы Nginx не падал, если бэкенд ещё не успел запуститься из-за тяжелой Oracle DB
    resolver 127.0.0.11 valid=30s;

    # React SPA — любой роут отдаёт index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        set $backend_server http://backend:5000;
        proxy_pass $backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Статические файлы (постеры, аватары)
    location /uploads/ {
        set $backend_server http://backend:5000;
        proxy_pass $backend_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}